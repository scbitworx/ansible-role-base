---
- name: Prepare Arch Linux container
  hosts: archlinux
  gather_facts: false
  tasks:
    - name: Install Python and sudo (Arch)
      ansible.builtin.raw: pacman -Syu --noconfirm python sudo openssh

    - name: Generate SSH host keys (Arch)
      ansible.builtin.raw: ssh-keygen -A

- name: Prepare Debian/Ubuntu containers
  hosts: debian:ubuntu
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600

    - name: Install locales package
      ansible.builtin.apt:
        name: locales
        state: present

    - name: Create privilege separation directory
      ansible.builtin.file:
        path: /run/sshd
        state: directory
        mode: "0755"

- name: Prepare all containers for SSH validation
  hosts: all
  become: true
  tasks:
    - name: Ensure SSH host keys exist
      ansible.builtin.command: ssh-keygen -A
      args:
        creates: /etc/ssh/ssh_host_rsa_key
