---
- name: Verify
  hosts: all
  become: true
  vars:
    test_users:
      - name: testuser1
        expected_keys:
          - test-key-1
          - test-key-2
      - name: testuser2
        expected_keys:
          - test-key-3
  tasks:
    # --- Package verification ---
    - name: Check that git is installed
      ansible.builtin.stat:
        path: /usr/bin/git
      register: git_check

    - name: Assert git is installed
      ansible.builtin.assert:
        that:
          - git_check.stat.exists
        fail_msg: "git is not installed"

    - name: Check that vim is installed
      ansible.builtin.stat:
        path: /usr/bin/vim
      register: vim_check

    - name: Assert vim is installed
      ansible.builtin.assert:
        that:
          - vim_check.stat.exists
        fail_msg: "vim is not installed"

    - name: Check that curl is installed
      ansible.builtin.stat:
        path: /usr/bin/curl
      register: curl_check

    - name: Assert curl is installed
      ansible.builtin.assert:
        that:
          - curl_check.stat.exists
        fail_msg: "curl is not installed"

    # --- Timezone verification ---
    - name: Check timezone file exists
      ansible.builtin.stat:
        path: /etc/localtime
      register: tz_check

    - name: Assert timezone file exists
      ansible.builtin.assert:
        that:
          - tz_check.stat.exists
        fail_msg: "/etc/localtime does not exist"

    # --- SSH verification ---
    - name: Check sshd_config exists
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config
      register: sshd_conf

    - name: Assert sshd_config exists with correct permissions
      ansible.builtin.assert:
        that:
          - sshd_conf.stat.exists
          - sshd_conf.stat.isreg
          - sshd_conf.stat.mode == '0600'
        fail_msg: "/etc/ssh/sshd_config does not exist or has wrong permissions"

    - name: Read sshd_config content
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config
      register: sshd_conf_content

    - name: Assert sshd_config contains hardened settings
      ansible.builtin.assert:
        that:
          - "'PermitRootLogin no' in sshd_conf_content.content | b64decode"
          - "'PasswordAuthentication no' in sshd_conf_content.content | b64decode"
          - "'PubkeyAuthentication yes' in sshd_conf_content.content | b64decode"
          - "'PermitEmptyPasswords no' in sshd_conf_content.content | b64decode"
          - "'KbdInteractiveAuthentication no' in sshd_conf_content.content | b64decode"
          - "'MaxAuthTries 3' in sshd_conf_content.content | b64decode"
          - "'LoginGraceTime 30' in sshd_conf_content.content | b64decode"
          - "'ClientAliveInterval 300' in sshd_conf_content.content | b64decode"
          - "'ClientAliveCountMax 2' in sshd_conf_content.content | b64decode"
          - "'MaxSessions 3' in sshd_conf_content.content | b64decode"
        fail_msg: "sshd_config does not contain expected hardened settings"

    # --- Per-user verification (looped) ---
    - name: Verify per-user configuration
      ansible.builtin.include_tasks: verify_user.yml
      loop: "{{ test_users }}"
      loop_control:
        loop_var: test_user
        label: "{{ test_user.name }}"
