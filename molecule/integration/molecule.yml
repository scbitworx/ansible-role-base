---
driver:
  name: vagrant
  provider:
    name: libvirt
platforms:
  - name: arch-integration
    box: generic/arch
    memory: 2048
    cpus: 2
    provider_options:
      management_network_name: default
      management_network_address: 192.168.122.0/24
    config_options:
      synced_folder: false

provisioner:
  name: ansible
  config_options:
    defaults:
      # Workaround: molecule 25.2.0+ no longer wires driver module paths into
      # ANSIBLE_LIBRARY. Set by run.sh wrapper. Harmless no-op once fixed.
      # See: https://github.com/ansible-community/molecule-plugins/issues/301
      library: "${MOLECULE_PROJECT_DIRECTORY}/plugins/modules:/usr/share/ansible:${MOLECULE_VAGRANT_PLUGIN_DIR}"

dependency:
  name: galaxy
  options:
    requirements-file: collections.yml

verifier:
  name: testinfra
  directory: ../tests/
  options:
    v: true
    sudo: true

scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
