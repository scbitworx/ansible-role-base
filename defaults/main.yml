---
# Public variables for the base role.
# Override these in group_vars or host_vars as needed.

# Additional packages beyond the base set
base_extra_packages: []

# Administrative user accounts to create and configure.
# Each entry supports: name (required), groups, shell, create_home,
# authorized_keys, sudo_passwordless, password_hash.
base_admin_users: []

# Per-user defaults (override per entry):
#   groups: []
#   shell: /bin/bash
#   create_home: true
#   authorized_keys: []
#   sudo_passwordless: true
#   password_hash: (optional) pre-hashed password for /etc/shadow

# Timezone and locale
base_timezone: "America/New_York"
base_locale: "en_US.UTF-8"

# SSH configuration
base_sshd_port: 22
base_sshd_permit_root_login: "no"
base_sshd_password_authentication: "no"
base_sshd_pubkey_authentication: "yes"
base_sshd_x11_forwarding: "no"
base_sshd_max_auth_tries: 3
base_sshd_login_grace_time: 30
base_sshd_client_alive_interval: 300
base_sshd_client_alive_count_max: 2
base_sshd_max_sessions: 3
base_sshd_allow_groups: []

# SSH algorithm hardening (OpenSSH 8.0+ / dev-sec baseline)
base_sshd_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com
  - aes256-ctr
  - aes192-ctr
  - aes128-ctr
base_sshd_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com
  - umac-128-etm@openssh.com
base_sshd_kex_algorithms:
  - curve25519-sha256
  - curve25519-sha256@libssh.org
  - diffie-hellman-group16-sha512
  - diffie-hellman-group18-sha512
  - diffie-hellman-group-exchange-sha256
base_sshd_host_key_algorithms:
  - ssh-ed25519
  - rsa-sha2-512
  - rsa-sha2-256

# Shell settings
base_editor: "vim"
base_histsize: 10000

# ansible-pull systemd timer
base_pull_timer_enabled: true
base_pull_interval: "4h"

# Unattended security upgrades (Debian/Ubuntu only, no-op on Arch)
base_unattended_upgrades: true
