---
# Public variables for the base role.
# Override these in group_vars or host_vars as needed.

# Additional packages beyond the base set
base_extra_packages: []

# Primary admin user
base_user: "bwright"
base_user_groups: []
base_user_shell: "/bin/bash"
base_user_create_home: true

# Timezone and locale
base_timezone: "America/New_York"
base_locale: "en_US.UTF-8"

# SSH configuration
base_sshd_port: 22
base_sshd_permit_root_login: "no"
base_sshd_password_authentication: "no"
base_sshd_pubkey_authentication: "yes"
base_sshd_x11_forwarding: "no"
base_sshd_max_auth_tries: 3
base_sshd_login_grace_time: 30
base_sshd_client_alive_interval: 300
base_sshd_client_alive_count_max: 2
base_sshd_max_sessions: 3

# Authorized SSH keys (list of public key strings)
base_authorized_keys: []

# Sudo configuration
base_sudo_passwordless: true

# Shell settings
base_editor: "vim"
base_histsize: 10000
