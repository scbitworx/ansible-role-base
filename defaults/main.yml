---
# Public variables for the base role.
# Override these in group_vars or host_vars as needed.

# Additional packages beyond the base set
base_extra_packages: []

# Administrative user accounts to create and configure.
# Each entry supports: name (required), groups, shell, create_home,
# authorized_keys, sudo_passwordless, password_hash.
base_admin_users: []

# Per-user defaults (override per entry):
#   groups: []
#   shell: /bin/bash
#   create_home: true
#   authorized_keys: []
#   sudo_passwordless: true
#   password_hash: (optional) pre-hashed password for /etc/shadow

# Timezone and locale
base_timezone: "America/New_York"
base_locale: "en_US.UTF-8"

# SSH configuration
base_sshd_port: 22
base_sshd_permit_root_login: "no"
base_sshd_password_authentication: "no"
base_sshd_pubkey_authentication: "yes"
base_sshd_x11_forwarding: "no"
base_sshd_max_auth_tries: 3
base_sshd_login_grace_time: 30
base_sshd_client_alive_interval: 300
base_sshd_client_alive_count_max: 2
base_sshd_max_sessions: 3

# Shell settings
base_editor: "vim"
base_histsize: 10000
