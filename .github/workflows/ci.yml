---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install 'ansible-core>=2.17,<2.18' 'ansible-lint>=25,<26' 'yamllint>=1,<2'

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general ansible.posix

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: >-
          pip install 'ansible-core>=2.17,<2.18' 'molecule>=25,<26'
          'molecule-plugins[docker]>=25,<26' 'pytest-testinfra>=10,<11'

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general ansible.posix

      - name: Run Molecule tests (default)
        run: molecule test

      - name: Run Molecule tests (alternate)
        run: molecule test -s alternate
