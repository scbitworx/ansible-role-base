---
- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: sshd -t -f %s
  become: true
  notify: Base | restart sshd

- name: Deploy authorized keys for admin user
  ansible.posix.authorized_key:
    user: "{{ base_user }}"
    key: "{{ base_authorized_keys | join('\n') }}"
    state: present
    exclusive: true
  become: true
  when: base_authorized_keys | length > 0
