---
- name: Set timezone
  community.general.timezone:
    name: "{{ base_timezone }}"
  become: true

# Arch Linux manages locale via /etc/locale.gen + locale-gen, which is
# typically handled once during installation. The locale_gen module only
# supports glibc-based Debian/Ubuntu systems.
- name: Generate locale (Debian/Ubuntu)
  community.general.locale_gen:
    name: "{{ base_locale }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"
