---
- name: Load distro-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - main.yml

- name: Import package tasks
  ansible.builtin.import_tasks: packages.yml

- name: Include per-user tasks
  ansible.builtin.include_tasks: per_user.yml
  loop: "{{ base_admin_users }}"
  loop_control:
    loop_var: __base_admin_user
    label: "{{ __base_admin_user.name }}"

- name: Import timezone and locale tasks
  ansible.builtin.import_tasks: timezone_locale.yml

- name: Import SSH configuration tasks
  ansible.builtin.import_tasks: ssh.yml

- name: Import ansible-pull timer tasks
  ansible.builtin.import_tasks: ansible_pull.yml

- name: Include unattended-upgrades tasks (Debian/Ubuntu)
  ansible.builtin.include_tasks: unattended_upgrades.yml
  when:
    - ansible_facts['os_family'] == "Debian"
    - base_unattended_upgrades

- name: Remove unattended-upgrades config when disabled (Debian/Ubuntu)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - /etc/apt/apt.conf.d/50unattended-upgrades
    - /etc/apt/apt.conf.d/20auto-upgrades
  when:
    - ansible_facts['os_family'] == "Debian"
    - not base_unattended_upgrades
